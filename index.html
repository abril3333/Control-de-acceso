<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lector QR - Control de Acceso</title>
</head>
<body>

    <script>
function onScanSuccess(decodedText) {
    const formData = new URLSearchParams();
    formData.append('codigo', decodedText);

    // Tu link de Google Apps Script ya conectado:
    fetch("https://script.google.com/macros/s/AKfycbzyOt-sJyAc-7wugS2EyNIY8FkB2GkctlbK1SUFzuldzL335_MfWpZ6RdvdyiFad0XAqg/exec", {
        method: 'POST',
        mode: 'no-cors', 
        body: formData,
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
    }).then(() => {
        alert("¡Registro guardado con éxito!");
    });
}
</script>

</body>
</html>
